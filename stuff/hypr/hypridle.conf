general {
    before_sleep_cmd = hyprlock
}

listener {
    timeout = 240
    on-timeout = brightnessctl -s set 1%
    on-resume = brightnessctl -r
}

listener {
    timeout = 300
    on-timeout = hyprlock
}

listener {
    timeout = 330
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}

listener {
    timeout = 600
    on-timeout = systemctl suspend
}
